name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Roslynator CLI
        run: dotnet tool install -g roslynator.dotnet.cli

      - name: Run Roslynator Analysis
        run: roslynator analyze CalculatorWPFProgInj.sln --severity-level warning