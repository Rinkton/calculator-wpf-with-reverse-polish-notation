name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CalculatorWPFProgInj.sln

      - name: Build
        run: dotnet build CalculatorWPFProgInj.sln --configuration Release --no-restore

      - name: Run NUnit Tests
        # Этот шаг найдет все тестовые проекты (включая ваш новый Calculator.Tests)
        run: dotnet test CalculatorWPFProgInj.sln --configuration Release --no-build --verbosity normal

      - name: Install Roslynator CLI
        run: dotnet tool install -g roslynator.cli

      - name: Run Roslynator Analysis
        # Анализ запускается после успешных тестов
        run: roslynator analyze CalculatorWPFProgInj.sln --severity-level info